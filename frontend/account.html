<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Hypercore</title>
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/account.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <button class="menu-toggle hidden-desktop" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <a href="/" class="logo">HYPER<span>CORE</span></a>
            <nav class="nav-desktop">
                <ul class="nav-list">
                    <li><a href="/" class="nav-link">Home</a></li>
                    <li><a href="/shop.html?gender=men" class="nav-link">Men</a></li>
                    <li><a href="/shop.html?gender=women" class="nav-link">Women</a></li>
                    <li><a href="/shop.html" class="nav-link">Shop All</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="/cart.html" class="header-btn" aria-label="Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span class="cart-badge" style="display: none;">0</span>
                </a>
                <a href="/account.html" class="header-btn" aria-label="Account">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="page-content">
        <section class="account-page">
            <div class="container">
                <div class="account-layout">
                    <!-- Sidebar -->
                    <aside class="account-sidebar">
                        <div class="account-user">
                            <div class="user-avatar" id="userAvatar">U</div>
                            <div class="user-info">
                                <h3 id="userName">User</h3>
                                <p id="userEmail">user@email.com</p>
                            </div>
                        </div>
                        
                        <nav class="account-nav">
                            <a href="#profile" class="account-nav-link active" onclick="showSection('profile')">Profile</a>
                            <a href="#orders" class="account-nav-link" onclick="showSection('orders')">My Orders</a>
                            <a href="#address" class="account-nav-link" onclick="showSection('address')">Addresses</a>
                            <a href="#" class="account-nav-link logout-btn" onclick="Hypercore.logout()">Logout</a>
                        </nav>
                    </aside>
                    
                    <!-- Content -->
                    <div class="account-content">
                        <!-- Profile Section -->
                        <div class="account-section" id="profileSection">
                            <h2>Profile Information</h2>
                            <form id="profileForm">
                                <div class="form-group">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-input" id="profileName" placeholder="Your name">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-input" id="profileEmail" disabled>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-input" id="profilePhone" placeholder="08012345678">
                                </div>
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </form>
                        </div>
                        
                        <!-- Orders Section -->
                        <div class="account-section hidden" id="ordersSection">
                            <h2>My Orders</h2>
                            <div class="orders-list" id="ordersList">
                                <!-- Orders loaded via JS -->
                            </div>
                        </div>
                        
                        <!-- Address Section -->
                        <div class="account-section hidden" id="addressSection">
                            <h2>Delivery Address</h2>
                            <form id="addressForm">
                                <div class="form-group">
                                    <label class="form-label">Street Address</label>
                                    <input type="text" class="form-input" id="addressStreet" placeholder="123 Main Street">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">City</label>
                                    <input type="text" class="form-input" id="addressCity" placeholder="Lagos">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">State</label>
                                    <select class="form-select" id="addressState">
                                        <option value="lagos">Lagos</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Landmark (Optional)</label>
                                    <input type="text" class="form-input" id="addressLandmark" placeholder="Near...">
                                </div>
                                <button type="submit" class="btn btn-primary">Save Address</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <script src="js/utils.js"></script>
    <script src="js/account.js"></script>
</body>
</html>
