<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hypercore</title>
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/checkout.css">
    
    <!-- Paystack Script -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo">HYPER<span>CORE</span></a>
            <div class="header-actions">
                <a href="/cart.html" class="header-btn" aria-label="Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="page-content">
        <section class="checkout-page">
            <div class="container">
                <div class="checkout-layout">
                    <!-- Checkout Form -->
                    <div class="checkout-form">
                        <h1 class="checkout-title">Checkout</h1>
                        
                        <!-- Contact Info -->
                        <div class="checkout-section" id="contactSection">
                            <h2>Contact Information</h2>
                            <div id="contactInfo">
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-input" id="email" placeholder="your@email.com">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-input" id="phone" placeholder="08012345678">
                                </div>
                            </div>
                        </div>
                        
                        <!-- Delivery Address -->
                        <div class="checkout-section">
                            <h2>Delivery Address</h2>
                            <div class="form-group">
                                <label class="form-label">Street Address</label>
                                <input type="text" class="form-input" id="street" placeholder="123 Main Street">
                            </div>
                            <div class="form-group">
                                <label class="form-label">City</label>
                                <input type="text" class="form-input" id="city" placeholder="Lagos">
                            </div>
                            <div class="form-group">
                                <label class="form-label">State</label>
                                <select class="form-select" id="state">
                                    <option value="lagos">Lagos</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Landmark (Optional)</label>
                                <input type="text" class="form-input" id="landmark" placeholder="Near...">
                            </div>
                        </div>
                        
                        <!-- Delivery Zone -->
                        <div class="checkout-section">
                            <h2>Delivery Zone</h2>
                            <div class="delivery-options">
                                <label class="delivery-option">
                                    <input type="radio" name="delivery_zone" value="island" onchange="updateDeliveryFee()">
                                    <div class="delivery-option-content">
                                        <div class="delivery-option-header">
                                            <span class="delivery-option-title">Lagos Island</span>
                                            <span class="delivery-option-price">₦2,500</span>
                                        </div>
                                        <span class="delivery-option-time">1-2 business days</span>
                                    </div>
                                </label>
                                
                                <label class="delivery-option">
                                    <input type="radio" name="delivery_zone" value="mainland" checked onchange="updateDeliveryFee()">
                                    <div class="delivery-option-content">
                                        <div class="delivery-option-header">
                                            <span class="delivery-option-title">Lagos Mainland</span>
                                            <span class="delivery-option-price">₦2,000</span>
                                        </div>
                                        <span class="delivery-option-time">1-3 business days</span>
                                    </div>
                                </label>
                                
                                <label class="delivery-option">
                                    <input type="radio" name="delivery_zone" value="outside" onchange="updateDeliveryFee()">
                                    <div class="delivery-option-content">
                                        <div class="delivery-option-header">
                                            <span class="delivery-option-title">Outside Lagos</span>
                                            <span class="delivery-option-price">₦5,000</span>
                                        </div>
                                        <span class="delivery-option-time">3-7 business days</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                        
                        <!-- Payment -->
                        <div class="checkout-section">
                            <h2>Payment Method</h2>
                            <div class="payment-methods">
                                <div class="payment-method active">
                                    <img src="assets/images/paystack.png" alt="Paystack" onerror="this.style.display='none'">
                                    <span>Pay with Card, Bank Transfer, or USSD</span>
                                </div>
                            </div>
                        </div>
                        
                        <button class="btn btn-primary btn-lg btn-full" onclick="processCheckout()" id="checkoutBtn">
                            Complete Order
                        </button>
                        
                        <a href="/cart.html" class="back-to-cart">← Back to Cart</a>
                    </div>
                    
                    <!-- Order Summary -->
                    <div class="checkout-summary">
                        <h3>Order Summary</h3>
                        
                        <div class="summary-items" id="summaryItems">
                            <!-- Items loaded via JS -->
                        </div>
                        
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="subtotal">₦0.00</span>
                        </div>
                        
                        <div class="summary-row">
                            <span>Delivery</span>
                            <span id="deliveryFee">₦2,000.00</span>
                        </div>
                        
                        <div class="summary-row total">
                            <span>Total</span>
                            <span id="total">₦0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <script src="js/utils.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
