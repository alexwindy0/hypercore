<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | Hypercore</title>
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/shop.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <button class="menu-toggle hidden-desktop" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <a href="/" class="logo">HYPER<span>CORE</span></a>
            <nav class="nav-desktop">
                <ul class="nav-list">
                    <li><a href="/" class="nav-link">Home</a></li>
                    <li><a href="/shop.html?gender=men" class="nav-link">Men</a></li>
                    <li><a href="/shop.html?gender=women" class="nav-link">Women</a></li>
                    <li><a href="/shop.html" class="nav-link">Shop All</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="/cart.html" class="header-btn" aria-label="Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    <span class="cart-badge" style="display: none;">0</span>
                </a>
                <a href="/account.html" class="header-btn" aria-label="Account">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="page-content">
        <section class="product-detail">
            <div class="container">
                <div class="product-detail-grid" id="productDetail">
                    <!-- Product loaded via JS -->
                    <div class="skeleton" style="aspect-ratio: 1;"></div>
                    <div>
                        <div class="skeleton" style="height: 32px; width: 80%; margin-bottom: 16px;"></div>
                        <div class="skeleton" style="height: 24px; width: 40%; margin-bottom: 24px;"></div>
                        <div class="skeleton" style="height: 100px; margin-bottom: 24px;"></div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Related Products -->
        <section class="related-products">
            <div class="container">
                <h2 class="section-title">You May Also Like</h2>
                <div class="products-grid" id="relatedProducts">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </section>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Hypercore. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script src="js/utils.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
